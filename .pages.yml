media:
  input: images
  output: /images

content:
  - name: site
    label: Website Content
    type: file
    path: content/site.yml
    fields:
      # -- Global --
      - name: calendly_url
        label: Booking Link (Calendly URL)
        type: string

      # -- Meta --
      - name: meta
        label: SEO & Sharing
        type: object
        fields:
          - name: title
            label: Page Title
            type: string
          - name: description
            label: Page Description
            type: text
          - name: og_description
            label: Social Media Description
            type: string
          - name: og_image
            label: Social Sharing Image URL
            type: string

      # -- Navigation --
      - name: nav
        label: Navigation
        type: object
        fields:
          - name: site_name
            label: Site Name
            type: string

      # -- Hero --
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: micro_label
            label: Small Label Above Headline
            type: string
          - name: headline_1
            label: Headline Line 1
            type: string
          - name: headline_2
            label: Headline Line 2 (italic)
            type: string
          - name: body
            label: Body Text
            type: text
          - name: cta_text
            label: Button Text
            type: string
          - name: headshot_alt
            label: Headshot Image Description
            type: string

      # -- Recognition --
      - name: recognition
        label: Recognition Section
        type: object
        fields:
          - name: micro_label
            label: Small Label
            type: string
          - name: headline
            label: Headline
            type: string
          - name: paragraphs
            label: Body Paragraphs
            type: string
            list: true
          - name: closing
            label: Closing Statement (bold)
            type: text

      # -- Reframe --
      - name: reframe
        label: Reframe Section
        type: object
        fields:
          - name: micro_label
            label: Small Label
            type: string
          - name: headline
            label: Headline
            type: string
          - name: paragraphs
            label: Body Paragraphs
            type: string
            list: true
          - name: callout
            label: Callout Box Text
            type: text

      # -- How I Work --
      - name: how_i_work
        label: How I Work (RESET Framework)
        type: object
        fields:
          - name: micro_label
            label: Small Label
            type: string
          - name: headline
            label: Headline
            type: string
          - name: subtitle
            label: Subtitle
            type: text
          - name: cta_text
            label: Button Text
            type: string
          - name: steps
            label: RESET Steps
            type: object
            list: true
            fields:
              - name: number
                label: Step Number
                type: string
              - name: title
                label: Step Title
                type: string
              - name: description
                label: Step Description
                type: text

      # -- What I Don't Do --
      - name: what_i_dont_do
        label: What I Don't Do
        type: object
        fields:
          - name: micro_label
            label: Small Label
            type: string
          - name: headline
            label: Headline
            type: string
          - name: cards
            label: Cards
            type: text
            list: true

      # -- Quotes --
      - name: quotes
        label: Client Quotes
        type: object
        list: true
        fields:
          - name: text
            label: Quote Text
            type: text
          - name: note
            label: Context Note (italic)
            type: text

      # -- Pricing --
      - name: pricing
        label: Pricing
        type: object
        fields:
          - name: micro_label
            label: Small Label
            type: string
          - name: headline
            label: Headline
            type: string
          - name: items
            label: Pricing Items
            type: object
            list: true
            fields:
              - name: name
                label: Service Name
                type: string
              - name: duration
                label: Duration (leave empty if none)
                type: string
              - name: price
                label: Price
                type: string
              - name: description
                label: Description (leave empty if none)
                type: text
          - name: footer_note
            label: Footer Note
            type: text

      # -- About --
      - name: about
        label: About Section
        type: object
        fields:
          - name: micro_label
            label: Small Label
            type: string
          - name: headline
            label: Headline
            type: string
          - name: paragraphs
            label: Body Paragraphs
            type: string
            list: true
          - name: belief
            label: Belief Statement (allows basic HTML)
            type: text
          - name: outdoor_alt
            label: Outdoor Photo Description
            type: string

      # -- Final CTA --
      - name: final_cta
        label: Final Call to Action
        type: object
        fields:
          - name: headline
            label: Headline
            type: string
          - name: body
            label: Body Text
            type: text
          - name: cta_text
            label: Button Text
            type: string

      # -- Footer --
      - name: footer
        label: Footer
        type: object
        fields:
          - name: instagram_url
            label: Instagram URL
            type: string
          - name: email
            label: Email Address
            type: string
          - name: copyright
            label: Copyright Text
            type: string
